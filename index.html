<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lista da Mamãe ❤️</title>
  <meta name="theme-color" content="#ff6b81" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lista da Mamãe" />
  <!-- Ícone do app -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ff6b81'/%3E%3Ctext x='90' y='110' font-size='90' text-anchor='middle'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ff6b81'/%3E%3Ctext x='90' y='110' font-size='90' text-anchor='middle'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
  <style>
    :root{
      --bg:#fff7f8;
      --card:#ffffff;
      --text:#2d2430;
      --muted:#7a6b73;
      --line:#f1d8df;
      --primary:#ff6b81;
      --primary-dark:#ef476f;
      --green:#28a745;
      --red:#dc3545;
      --shadow:0 10px 24px rgba(255,107,129,.14);
      --radius:18px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:linear-gradient(180deg,#ffd9e0 0,#fff2f5 130px,var(--bg) 260px);
      color:var(--text);
      padding-bottom:120px;
    }

    .top{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,247,248,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(241,216,223,.95);
    }

    .top-inner{
      max-width:760px;
      margin:0 auto;
      padding:18px 16px 14px;
    }

    .app-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      box-shadow:var(--shadow);
      margin-bottom:10px;
      font-size:14px;
      font-weight:700;
      color:var(--primary-dark);
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.1;
    }

    .sub{
      margin-top:6px;
      font-size:14px;
      color:var(--muted);
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:14px;
    }

    .search{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      font-size:16px;
      outline:none;
      background:#fff;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:13px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--muted);
      margin:18px 4px 10px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      margin-bottom:10px;
      box-shadow:var(--shadow);
    }

    .item-name{
      flex:1;
      font-size:16px;
      line-height:1.3;
      word-break:break-word;
    }

    .qty, .extra-input{
      min-height:46px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      font-size:16px;
      outline:none;
      padding:10px 12px;
    }

    .qty{
      width:84px;
    }

    .extra-input{
      flex:1;
      min-width:0;
    }

    .footer{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(12px);
      border-top:1px solid var(--line);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    }

    .footer-inner{
      max-width:760px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }

    button{
      border:none;
      border-radius:16px;
      min-height:50px;
      font-size:15px;
      font-weight:800;
      box-shadow:var(--shadow);
    }

    .btn-add{background:var(--primary);color:#fff;}
    .btn-save{background:var(--green);color:#fff;}
    .btn-clear{background:var(--red);color:#fff;}

    .status{
      max-width:760px;
      margin:8px auto 0;
      text-align:center;
      font-size:13px;
      color:var(--primary-dark);
      min-height:18px;
      font-weight:700;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      padding:18px 10px;
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div class="app-badge">🛒 Lista da Mamãe</div>
      <h1>Lista da Mamãe ❤️</h1>
      <div class="sub">Escolha a quantidade de 1 a 10 para cada item.</div>
    </div>
  </div>
  <div class="wrap">
    <input id="search" class="search" type="text" placeholder="Buscar item..." />

<div class="section-title">Itens da lista</div>
<div id="baseList"></div>

<div class="section-title">Itens adicionados</div>
<div id="extraList"></div>
<div id="extraEmpty" class="empty">Nenhum item extra adicionado.</div>
  </div>
  <div class="footer">
    <div class="footer-inner">
      <button class="btn-add" onclick="addItem()">Adicionar item</button>
      <button class="btn-save" onclick="saveAll()">Salvar</button>
      <button class="btn-clear" onclick="clearAll()">Limpar</button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script>
    const items = [
      "Álcool","Absorvente","Açúcar cristal","Açúcar","Alho","Amaciante","Aveia fina",
      "Arroz parborizado","Arroz integral","Azeite","Batata","Bolacha","Bombril","Café",
      "Café descafeinado","Cândida","Cebola","Cif","Coco","Colgate","Colorau",
      "Condicionador","Cotonete","Cremes de leite","Detergente","Dove roll on",
      "Escova de dente","Esponja","Ervilha","Extrato","Farinha de trigo","Farinha de rosca",
      "Farinha integral","Feijão","Fermento granulado","Fermento Royal","Filtro 102","Fubá",
      "Gilletti","Harpic","Insulfilm","Leite desnatado e integral","Leite em pó",
      "Leite de coco","Leite condensado","Limão","Luva","Maionese","Maisena",
      "Margarina sem sal","Macarrão","Milho","Molho","Omo","Óleo","Ovos","Pão de forma",
      "Papel alumínio","Papel manteiga","Papel higiênico cachorras","Papel toalha",
      "Queijo ralado","Sabonete e Nívea","Saco de lixo 30 e 100","Sal","Salsinha",
      "Sabão em pedra","Shampoo","Tomate","Tinta","Trigo","Veja","Vinagre","Vanish"
    ];

    const baseKey = "listaMamaeBase";
    const extraKey = "listaMamaeExtra";

    function slugify(text){
      return text.normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function options(selected){
      let html = '<option value="">-</option>';
      for(let i=1;i<=10;i++){
        html += '<option value="' + i + '"' + (String(selected)===String(i) ? ' selected' : '') + '>' + i + '</option>';
      }
      return html;
    }

    function renderBase(){
      const saved = JSON.parse(localStorage.getItem(baseKey) || "{}");
      let html = "";
      for(let i=0;i<items.length;i++){
        const item = items[i];
        const key = slugify(item);
        html += '<div class="item" data-name="' + item.toLowerCase() + '">' +
                  '<div class="item-name">' + item + '</div>' +
                  '<select class="qty base-qty" data-key="' + key + '">' + options(saved[key] || "") + '</select>' +
                '</div>';
      }
      document.getElementById("baseList").innerHTML = html;
    }

    function renderExtras(){
      const extras = JSON.parse(localStorage.getItem(extraKey) || "[]");
      let html = "";
      for(let i=0;i<extras.length;i++){
        const item = extras[i];
        html += '<div class="item extra-item" data-name="' + (item.name || '').toLowerCase() + '">' +
                  '<input class="extra-input" type="text" placeholder="Nome do item" value="' + (item.name || '').replace(/"/g,'&quot;') + '">' +
                  '<select class="qty extra-qty">' + options(item.qty || "") + '</select>' +
                '</div>';
      }
      document.getElementById("extraList").innerHTML = html;
      document.getElementById("extraEmpty").style.display = extras.length ? "none" : "block";
    }

    function addItem(){
      const list = document.getElementById("extraList");
      list.insertAdjacentHTML("beforeend",
        '<div class="item extra-item" data-name="">' +
          '<input class="extra-input" type="text" placeholder="Nome do item" value="">' +
          '<select class="qty extra-qty">' + options("") + '</select>' +
        '</div>'
      );
      document.getElementById("extraEmpty").style.display = "none";
      const input = list.querySelector(".extra-item:last-child .extra-input");
      if(input) input.focus();
      showStatus("Novo item adicionado");
    }

    function saveAll(){
      const baseData = {};
      const baseFields = document.querySelectorAll(".base-qty");
      for(let i=0;i<baseFields.length;i++){
        baseData[baseFields[i].dataset.key] = baseFields[i].value;
      }
      localStorage.setItem(baseKey, JSON.stringify(baseData));

      const extras = [];
      const rows = document.querySelectorAll(".extra-item");
      for(let i=0;i<rows.length;i++){
        const name = rows[i].querySelector(".extra-input").value.trim();
        const qty = rows[i].querySelector(".extra-qty").value;
        if(name || qty){
          extras.push({name:name, qty:qty});
        }
      }
      localStorage.setItem(extraKey, JSON.stringify(extras));
      showStatus("Salvo com sucesso");
      renderExtras();
      filterItems(document.getElementById("search").value);
    }

    function clearAll(){
      localStorage.removeItem(baseKey);
      localStorage.removeItem(extraKey);
      renderBase();
      renderExtras();
      document.getElementById("search").value = "";
      filterItems("");
      showStatus("Lista limpa");
    }

    function showStatus(text){
      const el = document.getElementById("status");
      el.textContent = text;
      setTimeout(function(){
        if(el.textContent === text){ el.textContent = ""; }
      }, 1800);
    }

    function filterItems(term){
      const value = term.toLowerCase().trim();
      const all = document.querySelectorAll("[data-name]");
      for(let i=0;i<all.length;i++){
        const name = all[i].getAttribute("data-name") || "";
        all[i].style.display = name.indexOf(value) !== -1 ? "" : "none";
      }
    }

    document.getElementById("search").addEventListener("input", function(){
      filterItems(this.value);
    });

    renderBase();
    renderExtras();
  </script>
</body>
</htm
