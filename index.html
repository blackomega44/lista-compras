<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Lista de compras</title>

<meta name="theme-color" content="#ffffff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Lista de compras" />

<link rel="icon" href="icon.png" />
<link rel="apple-touch-icon" href="icon.png" />

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#1c1c1e;
  --muted:#8e8e93;
  --line:#e5e5ea;
  --primary:#007aff;
  --green:#34c759;
  --red:#ff3b30;
  --shadow:0 6px 20px rgba(0,0,0,.05);
  --radius:20px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Arial;
  background:var(--bg);
  color:var(--text);
  padding-bottom:120px;
}

.top{
  position:sticky;
  top:0;
  background:#ffffffcc;
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  z-index:10;
}

.top-inner{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h1{
  margin:0;
  font-size:28px;
  font-weight:700;
}

.sub{
  font-size:14px;
  color:var(--muted);
  margin-top:4px;
}

.wrap{
  max-width:700px;
  margin:auto;
  padding:16px;
}

.search{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  font-size:16px;
  margin-bottom:16px;
}

.section-title{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin:12px 4px;
  text-transform:uppercase;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--card);
  padding:14px;
  border-radius:var(--radius);
  margin-bottom:10px;
  box-shadow:var(--shadow);
}

.item-name{
  flex:1;
  font-size:16px;
}

.qty, .extra-input{
  border-radius:12px;
  border:1px solid var(--line);
  padding:10px;
  font-size:16px;
}

.qty{width:70px;}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:12px;
  background:#ffffffee;
  backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
}

.footer-inner{
  max-width:700px;
  margin:auto;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:16px;
  font-weight:600;
  font-size:15px;
}

.btn-add{background:#e5e5ea;}
.btn-save{background:var(--green);color:white;}
.btn-clear{background:var(--red);color:white;}

.status{
  text-align:center;
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:12px;
}
</style>
</head>

<body>

<div class="top">
  <div class="top-inner">
    <h1>Lista de compras</h1>
    <div class="sub">Simples, limpa e prática</div>
  </div>
</div>

<div class="wrap">
  <input id="search" class="search" placeholder="Buscar item..." />

  <div class="section-title">Itens</div>
  <div id="baseList"></div>

  <div class="section-title">Adicionados</div>
  <div id="extraList"></div>
  <div id="extraEmpty" class="empty">Nenhum item.</div>
</div>

<div class="footer">
  <div class="footer-inner">
    <button class="btn-add" onclick="addItem()">+ Item</button>
    <button class="btn-save" onclick="saveAll()">Salvar</button>
    <button class="btn-clear" onclick="clearAll()">Limpar</button>
  </div>
  <div id="status" class="status"></div>
</div>

<script>
const items = ["Arroz","Feijão","Macarrão","Leite","Pão","Ovos","Açúcar","Café"];

function renderBase(){
  let html="";
  items.forEach(item=>{
    html+=`
    <div class="item">
      <div class="item-name">${item}</div>
      <select class="qty">
        <option>-</option>
        ${[1,2,3,4,5].map(n=>`<option>${n}</option>`).join("")}
      </select>
    </div>`;
  });
  baseList.innerHTML=html;
}

function addItem(){
  extraList.innerHTML+=`
  <div class="item">
    <input class="extra-input" placeholder="Novo item">
    <select class="qty">
      <option>-</option>
      ${[1,2,3,4,5].map(n=>`<option>${n}</option>`).join("")}
    </select>
  </div>`;
}

function saveAll(){
  status.innerText="Salvo!";
}

function clearAll(){
  location.reload();
}

renderBase();
</script>

</body>
</html>
